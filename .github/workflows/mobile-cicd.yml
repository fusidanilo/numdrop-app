name: Mobile CI/CD

on:
  push:
    branches:
      - staging
      - master
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production
      platform:
        description: "Target platform"
        type: choice
        required: true
        default: all
        options:
          - all
          - android
          - ios
      play_games_project_id:
        description: "Optional: override EXPO_PUBLIC_PLAY_GAMES_PROJECT_ID (else Repository Variable)"
        type: string
        required: false
        default: ""
      play_games_leaderboard_id:
        description: "Optional: override EXPO_PUBLIC_PLAY_GAMES_LEADERBOARD_ID (else Repository Variable)"
        type: string
        required: false
        default: ""
      play_games_snapshot_name:
        description: "Optional: override EXPO_PUBLIC_PLAY_GAMES_SNAPSHOT_NAME (else Variable or numdrop-progress)"
        type: string
        required: false
        default: ""
      admob_android_app_id:
        description: "Optional: override EXPO_PUBLIC_ADMOB_ANDROID_APP_ID (else Repository Variable / app.config default)"
        type: string
        required: false
        default: ""
      admob_ios_app_id:
        description: "Optional: override EXPO_PUBLIC_ADMOB_IOS_APP_ID (else Repository Variable / app.config default)"
        type: string
        required: false
        default: ""
      admob_android_banner_id:
        description: "Optional: override EXPO_PUBLIC_ADMOB_ANDROID_BANNER_ID (else Repository Variable)"
        type: string
        required: false
        default: ""
      admob_ios_banner_id:
        description: "Optional: override EXPO_PUBLIC_ADMOB_IOS_BANNER_ID (else Repository Variable)"
        type: string
        required: false
        default: ""
      admob_android_app_open_id:
        description: "Optional: override EXPO_PUBLIC_ADMOB_ANDROID_APP_OPEN_ID (else Repository Variable)"
        type: string
        required: false
        default: ""
      admob_ios_app_open_id:
        description: "Optional: override EXPO_PUBLIC_ADMOB_IOS_APP_OPEN_ID (else Repository Variable)"
        type: string
        required: false
        default: ""

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  # Play Games — Repository variables (Settings → Secrets and variables → Actions → Variables):
  # EXPO_PUBLIC_PLAY_GAMES_PROJECT_ID, EXPO_PUBLIC_PLAY_GAMES_LEADERBOARD_ID, EXPO_PUBLIC_PLAY_GAMES_SNAPSHOT_NAME.
  # AdMob: EXPO_PUBLIC_ADMOB_ANDROID_APP_ID, EXPO_PUBLIC_ADMOB_IOS_APP_ID, EXPO_PUBLIC_ADMOB_ANDROID_BANNER_ID,
  # EXPO_PUBLIC_ADMOB_IOS_BANNER_ID, EXPO_PUBLIC_ADMOB_ANDROID_APP_OPEN_ID, EXPO_PUBLIC_ADMOB_IOS_APP_OPEN_ID.
  # Su workflow_dispatch puoi sovrascrivere Play Games e AdMob (step "Apply workflow_dispatch overrides …").
  EXPO_PUBLIC_PLAY_GAMES_PROJECT_ID: ${{ vars.EXPO_PUBLIC_PLAY_GAMES_PROJECT_ID }}
  EXPO_PUBLIC_PLAY_GAMES_LEADERBOARD_ID: ${{ vars.EXPO_PUBLIC_PLAY_GAMES_LEADERBOARD_ID }}
  EXPO_PUBLIC_PLAY_GAMES_SNAPSHOT_NAME: ${{ vars.EXPO_PUBLIC_PLAY_GAMES_SNAPSHOT_NAME || 'numdrop-progress' }}
  # AdMob — App ID (manifest / GMA SDK) + unit id banner & app open. Imposta le Repository variables; vedi app.config.js e src/ads/adMob.ts.
  EXPO_PUBLIC_ADMOB_ANDROID_APP_ID: ${{ vars.EXPO_PUBLIC_ADMOB_ANDROID_APP_ID }}
  EXPO_PUBLIC_ADMOB_IOS_APP_ID: ${{ vars.EXPO_PUBLIC_ADMOB_IOS_APP_ID }}
  EXPO_PUBLIC_ADMOB_ANDROID_BANNER_ID: ${{ vars.EXPO_PUBLIC_ADMOB_ANDROID_BANNER_ID }}
  EXPO_PUBLIC_ADMOB_IOS_BANNER_ID: ${{ vars.EXPO_PUBLIC_ADMOB_IOS_BANNER_ID }}
  EXPO_PUBLIC_ADMOB_ANDROID_APP_OPEN_ID: ${{ vars.EXPO_PUBLIC_ADMOB_ANDROID_APP_OPEN_ID }}
  EXPO_PUBLIC_ADMOB_IOS_APP_OPEN_ID: ${{ vars.EXPO_PUBLIC_ADMOB_IOS_APP_OPEN_ID }}

concurrency:
  group: mobile-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-profile:
    name: Resolve profile
    runs-on: ubuntu-latest
    outputs:
      build_profile: ${{ steps.profile.outputs.build_profile }}
    steps:
      - name: Resolve EAS profiles from branch/input
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref }}" = "refs/heads/master" ]; then
              echo "build_profile=production" >> "$GITHUB_OUTPUT"
              echo "channel=production" >> "$GITHUB_OUTPUT"
            else
              echo "build_profile=preview" >> "$GITHUB_OUTPUT"
              echo "channel=staging" >> "$GITHUB_OUTPUT"
            fi
          else
            if [ "${{ github.event.inputs.channel }}" = "production" ]; then
              echo "build_profile=production" >> "$GITHUB_OUTPUT"
              echo "channel=production" >> "$GITHUB_OUTPUT"
            else
              echo "build_profile=preview" >> "$GITHUB_OUTPUT"
            fi
          fi

  android-build:
    name: Android local build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [resolve-profile]
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EAS auth
        run: eas whoami

      - name: Apply workflow_dispatch overrides (Play Games + AdMob)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          pid="${{ github.event.inputs.play_games_project_id }}"
          lid="${{ github.event.inputs.play_games_leaderboard_id }}"
          snap="${{ github.event.inputs.play_games_snapshot_name }}"
          if [ -n "$pid" ]; then
            echo "EXPO_PUBLIC_PLAY_GAMES_PROJECT_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$pid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$lid" ]; then
            echo "EXPO_PUBLIC_PLAY_GAMES_LEADERBOARD_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$lid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$snap" ]; then
            echo "EXPO_PUBLIC_PLAY_GAMES_SNAPSHOT_NAME<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$snap" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          aaid="${{ github.event.inputs.admob_android_app_id }}"
          aiid="${{ github.event.inputs.admob_ios_app_id }}"
          abid="${{ github.event.inputs.admob_android_banner_id }}"
          aibid="${{ github.event.inputs.admob_ios_banner_id }}"
          aaoid="${{ github.event.inputs.admob_android_app_open_id }}"
          aiooid="${{ github.event.inputs.admob_ios_app_open_id }}"
          if [ -n "$aaid" ]; then
            echo "EXPO_PUBLIC_ADMOB_ANDROID_APP_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$aaid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$aiid" ]; then
            echo "EXPO_PUBLIC_ADMOB_IOS_APP_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$aiid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$abid" ]; then
            echo "EXPO_PUBLIC_ADMOB_ANDROID_BANNER_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$abid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$aibid" ]; then
            echo "EXPO_PUBLIC_ADMOB_IOS_BANNER_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$aibid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$aaoid" ]; then
            echo "EXPO_PUBLIC_ADMOB_ANDROID_APP_OPEN_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$aaoid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$aiooid" ]; then
            echo "EXPO_PUBLIC_ADMOB_IOS_APP_OPEN_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$aiooid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi

      - name: Print Metro public env
        run: |
          echo "EXPO_PUBLIC_PLAY_GAMES_PROJECT_ID=${EXPO_PUBLIC_PLAY_GAMES_PROJECT_ID:-}"
          echo "EXPO_PUBLIC_PLAY_GAMES_LEADERBOARD_ID=${EXPO_PUBLIC_PLAY_GAMES_LEADERBOARD_ID:-}"
          echo "EXPO_PUBLIC_PLAY_GAMES_SNAPSHOT_NAME=${EXPO_PUBLIC_PLAY_GAMES_SNAPSHOT_NAME:-}"
          echo "EXPO_PUBLIC_ADMOB_ANDROID_APP_ID=${EXPO_PUBLIC_ADMOB_ANDROID_APP_ID:-}"
          echo "EXPO_PUBLIC_ADMOB_IOS_APP_ID=${EXPO_PUBLIC_ADMOB_IOS_APP_ID:-}"
          echo "EXPO_PUBLIC_ADMOB_ANDROID_BANNER_ID=${EXPO_PUBLIC_ADMOB_ANDROID_BANNER_ID:-}"
          echo "EXPO_PUBLIC_ADMOB_IOS_BANNER_ID=${EXPO_PUBLIC_ADMOB_IOS_BANNER_ID:-}"
          echo "EXPO_PUBLIC_ADMOB_ANDROID_APP_OPEN_ID=${EXPO_PUBLIC_ADMOB_ANDROID_APP_OPEN_ID:-}"
          echo "EXPO_PUBLIC_ADMOB_IOS_APP_OPEN_ID=${EXPO_PUBLIC_ADMOB_IOS_APP_OPEN_ID:-}"

      - name: Bump Android version code for CI
        run: |
          set -euo pipefail
          ANDROID_VERSION_CODE="${{ github.run_number }}"
          echo "Using Android version code: $ANDROID_VERSION_CODE"
          jq --argjson version_code "$ANDROID_VERSION_CODE" \
             '.expo.android.versionCode = $version_code' \
             app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Android local build
        run: |
          eas build \
            --platform android \
            --profile "${{ needs.resolve-profile.outputs.build_profile }}" \
            --local \
            --non-interactive \
            --output "./android-${{ needs.resolve-profile.outputs.build_profile }}.aab"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ needs.resolve-profile.outputs.build_profile }}
          path: ./android-${{ needs.resolve-profile.outputs.build_profile }}.aab

  android-submit:
    name: Android submit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [resolve-profile, android-build]
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EAS auth
        run: eas whoami

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-${{ needs.resolve-profile.outputs.build_profile }}
          path: .

      - name: Inject Android submit credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Missing secret GOOGLE_SERVICE_ACCOUNT_JSON for Android submit."
            exit 1
          fi

          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > /tmp/google-service-account.json

          jq --arg profile "${{ needs.resolve-profile.outputs.build_profile }}" \
             --arg key_path "/tmp/google-service-account.json" \
             '.submit[$profile].android.serviceAccountKeyPath = $key_path' \
             eas.json > eas.json.tmp && mv eas.json.tmp eas.json

      - name: Android submit
        run: |
          eas submit \
            --platform android \
            --profile "${{ needs.resolve-profile.outputs.build_profile }}" \
            --path "./android-${{ needs.resolve-profile.outputs.build_profile }}.aab" \
            --non-interactive

  ios-build:
    name: iOS local build
    runs-on: macos-latest
    timeout-minutes: 90
    needs: [resolve-profile]
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Setup latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify selected Xcode and iOS SDK
        run: |
          set -euo pipefail
          echo "Current Xcode:"
          xcodebuild -version
          echo "Available iOS SDKs:"
          xcodebuild -showsdks | grep -i iphoneos || true

      - name: Verify EAS auth
        run: eas whoami

      - name: Apply workflow_dispatch overrides (Play Games + AdMob)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          pid="${{ github.event.inputs.play_games_project_id }}"
          lid="${{ github.event.inputs.play_games_leaderboard_id }}"
          snap="${{ github.event.inputs.play_games_snapshot_name }}"
          if [ -n "$pid" ]; then
            echo "EXPO_PUBLIC_PLAY_GAMES_PROJECT_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$pid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$lid" ]; then
            echo "EXPO_PUBLIC_PLAY_GAMES_LEADERBOARD_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$lid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$snap" ]; then
            echo "EXPO_PUBLIC_PLAY_GAMES_SNAPSHOT_NAME<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$snap" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          aaid="${{ github.event.inputs.admob_android_app_id }}"
          aiid="${{ github.event.inputs.admob_ios_app_id }}"
          abid="${{ github.event.inputs.admob_android_banner_id }}"
          aibid="${{ github.event.inputs.admob_ios_banner_id }}"
          aaoid="${{ github.event.inputs.admob_android_app_open_id }}"
          aiooid="${{ github.event.inputs.admob_ios_app_open_id }}"
          if [ -n "$aaid" ]; then
            echo "EXPO_PUBLIC_ADMOB_ANDROID_APP_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$aaid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$aiid" ]; then
            echo "EXPO_PUBLIC_ADMOB_IOS_APP_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$aiid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$abid" ]; then
            echo "EXPO_PUBLIC_ADMOB_ANDROID_BANNER_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$abid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$aibid" ]; then
            echo "EXPO_PUBLIC_ADMOB_IOS_BANNER_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$aibid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$aaoid" ]; then
            echo "EXPO_PUBLIC_ADMOB_ANDROID_APP_OPEN_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$aaoid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
          if [ -n "$aiooid" ]; then
            echo "EXPO_PUBLIC_ADMOB_IOS_APP_OPEN_ID<<EOF" >> "$GITHUB_ENV"
            printf '%s\n' "$aiooid" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi

      - name: Print Metro public env
        run: |
          echo "EXPO_PUBLIC_PLAY_GAMES_PROJECT_ID=${EXPO_PUBLIC_PLAY_GAMES_PROJECT_ID:-}"
          echo "EXPO_PUBLIC_PLAY_GAMES_LEADERBOARD_ID=${EXPO_PUBLIC_PLAY_GAMES_LEADERBOARD_ID:-}"
          echo "EXPO_PUBLIC_PLAY_GAMES_SNAPSHOT_NAME=${EXPO_PUBLIC_PLAY_GAMES_SNAPSHOT_NAME:-}"
          echo "EXPO_PUBLIC_ADMOB_ANDROID_APP_ID=${EXPO_PUBLIC_ADMOB_ANDROID_APP_ID:-}"
          echo "EXPO_PUBLIC_ADMOB_IOS_APP_ID=${EXPO_PUBLIC_ADMOB_IOS_APP_ID:-}"
          echo "EXPO_PUBLIC_ADMOB_ANDROID_BANNER_ID=${EXPO_PUBLIC_ADMOB_ANDROID_BANNER_ID:-}"
          echo "EXPO_PUBLIC_ADMOB_IOS_BANNER_ID=${EXPO_PUBLIC_ADMOB_IOS_BANNER_ID:-}"
          echo "EXPO_PUBLIC_ADMOB_ANDROID_APP_OPEN_ID=${EXPO_PUBLIC_ADMOB_ANDROID_APP_OPEN_ID:-}"
          echo "EXPO_PUBLIC_ADMOB_IOS_APP_OPEN_ID=${EXPO_PUBLIC_ADMOB_IOS_APP_OPEN_ID:-}"

      - name: Bump iOS build number for CI
        run: |
          set -euo pipefail
          IOS_BUILD_NUMBER="${{ github.run_number }}"
          echo "Using iOS build number: $IOS_BUILD_NUMBER"
          jq --arg build_number "$IOS_BUILD_NUMBER" \
             '.expo.ios.buildNumber = $build_number' \
             app.json > app.json.tmp && mv app.json.tmp app.json

      - name: iOS local build
        run: |
          eas build \
            --platform ios \
            --profile "${{ needs.resolve-profile.outputs.build_profile }}" \
            --local \
            --non-interactive \
            --output "./ios-${{ needs.resolve-profile.outputs.build_profile }}.ipa"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ needs.resolve-profile.outputs.build_profile }}
          path: ./ios-${{ needs.resolve-profile.outputs.build_profile }}.ipa

  ios-submit:
    name: iOS submit
    runs-on: macos-latest
    timeout-minutes: 45
    needs: [resolve-profile, ios-build]
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EAS auth
        run: eas whoami

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-${{ needs.resolve-profile.outputs.build_profile }}
          path: .

      - name: Inject iOS submit credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_APP_ID: ${{ vars.ASC_APP_ID }}
        run: |
          set -euo pipefail
          if [ -z "$APPLE_ID" ]; then
            echo "::error::Missing secret APPLE_ID for iOS submit."
            exit 1
          fi

          if ! echo "$APPLE_ID" | grep -Eq '^[^@]+@[^@]+\.[^@]+$'; then
            echo "::error::APPLE_ID must be a valid email."
            exit 1
          fi

          if [ -z "$ASC_APP_ID" ]; then
            echo "::error::Missing variable ASC_APP_ID for iOS submit."
            exit 1
          fi

          if ! echo "$ASC_APP_ID" | grep -Eq '^[0-9]+$'; then
            echo "::error::ASC_APP_ID must contain digits only."
            exit 1
          fi

          jq --arg profile "${{ needs.resolve-profile.outputs.build_profile }}" \
             --arg apple_id "$APPLE_ID" \
             --arg asc_app_id "$ASC_APP_ID" \
             '.submit[$profile].ios.appleId = $apple_id |
              .submit[$profile].ios.ascAppId = $asc_app_id' \
             eas.json > eas.json.tmp && mv eas.json.tmp eas.json

      - name: iOS submit
        env:
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          eas submit \
            --platform ios \
            --profile "${{ needs.resolve-profile.outputs.build_profile }}" \
            --path "./ios-${{ needs.resolve-profile.outputs.build_profile }}.ipa" \
            --non-interactive

