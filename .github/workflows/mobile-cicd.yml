name: Mobile CI/CD

on:
  push:
    branches:
      - staging
      - master
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production
      platform:
        description: "Target platform"
        type: choice
        required: true
        default: all
        options:
          - all
          - android
          - ios

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

concurrency:
  group: mobile-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-submit:
    name: Build and Submit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform: [android, ios]
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/staging' ||
      github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Resolve EAS profiles from branch/input
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref }}" = "refs/heads/master" ]; then
              echo "build_profile=production" >> "$GITHUB_OUTPUT"
              echo "channel=production" >> "$GITHUB_OUTPUT"
            else
              echo "build_profile=preview" >> "$GITHUB_OUTPUT"
              echo "channel=staging" >> "$GITHUB_OUTPUT"
            fi
          else
            if [ "${{ github.event.inputs.channel }}" = "production" ]; then
              echo "build_profile=production" >> "$GITHUB_OUTPUT"
              echo "channel=production" >> "$GITHUB_OUTPUT"
            else
              echo "build_profile=preview" >> "$GITHUB_OUTPUT"
              echo "channel=staging" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Verify EAS auth
        if: |
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.platform
        run: eas whoami

      - name: Build and auto-submit
        if: |
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.platform
        run: |
          if [ "${{ matrix.platform }}" = "ios" ]; then
            eas build \
              --non-interactive \
              --platform ios \
              --profile "${{ steps.profile.outputs.build_profile }}" \
              --auto-submit
          else
            eas build \
              --non-interactive \
              --platform android \
              --profile "${{ steps.profile.outputs.build_profile }}"

            if [ -n "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" ]; then
              printf '%s' "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" > /tmp/google-service-account.json
              eas submit \
                --non-interactive \
                --platform android \
                --latest \
                --profile "${{ steps.profile.outputs.build_profile }}" \
                --key /tmp/google-service-account.json
            else
              echo "::warning::GOOGLE_SERVICE_ACCOUNT_JSON non configurato. Build Android completata, submit saltato."
            fi
          fi
